name: Welcome

# Greets contributors on their FIRST issue or pull request.
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Thanks for opening your first issue in **hospitality-mcp**! A maintainer will take a look soon.

            To help us respond faster, please make sure you've described what you expected, what actually happened, and how to reproduce it.

            A reminder: this is an **unofficial** project and is **read-only by default** — the write tools are experimental and opt-in. 🏨
          pr-message: |
            🎉 Thanks for your first pull request to **hospitality-mcp**! A few things that help it get merged quickly:

            - ✅ CI (**typecheck · test · build**) must pass — see the checks below.
            - 🔒 No secrets in code, tests, or fixtures.
            - 🧩 Adding a new PMS? Please follow [docs/ADD_AN_ADAPTER.md](../blob/main/docs/ADD_AN_ADAPTER.md) and include tests.

            A maintainer will review shortly. Thanks for contributing! 🏨
