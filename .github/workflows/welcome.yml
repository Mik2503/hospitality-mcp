name: Welcome

# Greets first-time / outside contributors on a new issue or PR.
# Uses actions/github-script (first-party, stable) instead of a third-party
# action, and greets only newcomers — maintainers/owners are skipped.
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const isPR = Boolean(context.payload.pull_request);
            const obj = isPR ? context.payload.pull_request : context.payload.issue;

            // Only greet genuine newcomers to this repo; skip owner/members/collaborators.
            const newcomer = ["FIRST_TIME_CONTRIBUTOR", "FIRST_TIMER", "NONE"];
            if (!newcomer.includes(obj.author_association)) {
              core.info(`Skipping: author_association=${obj.author_association}`);
              return;
            }

            const prMessage = [
              "🎉 Thanks for your first pull request to **hospitality-mcp**! A few things that help it get merged quickly:",
              "",
              "- ✅ CI (**typecheck · test · build**) must pass — see the checks below.",
              "- 🔒 No secrets in code, tests, or fixtures.",
              "- 🧩 Adding a new PMS? Please follow [docs/ADD_AN_ADAPTER.md](../blob/main/docs/ADD_AN_ADAPTER.md) and include tests.",
              "",
              "A maintainer will review shortly. Thanks for contributing! 🏨",
            ].join("\n");

            const issueMessage = [
              "👋 Thanks for opening your first issue in **hospitality-mcp**! A maintainer will take a look soon.",
              "",
              "To help us respond faster, please make sure you've described what you expected, what actually happened, and how to reproduce it.",
              "",
              "A reminder: this is an **unofficial** project and is **read-only by default** — the write tools are experimental and opt-in. 🏨",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: obj.number,
              body: isPR ? prMessage : issueMessage,
            });
